<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EventFlow — Oradores</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo"><h1>⚡ EventFlow</h1><span>Gestão Inteligente de Eventos</span></div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer"><div class="user-card"><div class="user-avatar">AD</div><div class="user-info"><div class="name">Admin User</div><div class="role">Administrador</div></div></div></div>
</div>
<div class="main">
  <div class="topbar">
    <span class="topbar-title">🎤 Gestão de Oradores</span>
    <div class="topbar-search"><span class="search-icon">🔍</span><input type="text" id="search-sp" placeholder="Pesquisar oradores..." oninput="renderSpeakers()"/></div>
    <div class="topbar-actions"><button class="btn btn-primary btn-sm" onclick="openModal('modal-new')">+ Novo Orador</button></div>
  </div>
  <div style="padding:32px">
    <div class="grid grid-4" style="margin-bottom:24px">
      <div class="stat-card"><div class="stat-icon purple">🎤</div><div class="stat-info"><div class="value" id="s-total">0</div><div class="label">Total Oradores</div></div></div>
      <div class="stat-card"><div class="stat-icon blue">🎙️</div><div class="stat-info"><div class="value" id="s-sessions">0</div><div class="label">Sessões Atribuídas</div></div></div>
      <div class="stat-card"><div class="stat-icon green">🏢</div><div class="stat-info"><div class="value" id="s-orgs">0</div><div class="label">Organizações</div></div></div>
      <div class="stat-card"><div class="stat-icon yellow">🌐</div><div class="stat-info"><div class="value" id="s-areas">0</div><div class="label">Áreas Temáticas</div></div></div>
    </div>
    <div class="grid grid-3" id="speakers-grid"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-new">
  <div class="modal">
    <div class="modal-header"><h3>➕ Novo Orador</h3><button class="modal-close" onclick="closeModal('modal-new')">✕</button></div>
    <div class="form-group"><label>Nome</label><input class="form-control" id="n-name" placeholder="Nome completo"/></div>
    <div class="form-group"><label>Organização</label><input class="form-control" id="n-org" placeholder="Ex: Google, Microsoft..."/></div>
    <div class="form-group"><label>Área de Especialização</label><input class="form-control" id="n-area" placeholder="Ex: IA & Machine Learning"/></div>
    <div class="form-group"><label>Biografia</label><textarea class="form-control" id="n-bio" rows="3" placeholder="Breve descrição do orador..."></textarea></div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-primary" onclick="addSpeaker()">Criar Orador</button>
      <button class="btn btn-secondary" onclick="closeModal('modal-new')">Cancelar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-profile">
  <div class="modal">
    <div class="modal-header"><h3 id="p-name">Perfil do Orador</h3><button class="modal-close" onclick="closeModal('modal-profile')">✕</button></div>
    <div id="p-body"></div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="nav.js"></script><script src="data.js"></script>
<script>
buildSidebar('oradores');

function initials(n){ return n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(); }

function renderSpeakers() {
  const speakers = DB.get('speakers') || [];
  const sessions = DB.get('sessions') || [];
  const q = document.getElementById('search-sp').value.toLowerCase();

  document.getElementById('s-total').textContent = speakers.length;
  document.getElementById('s-sessions').textContent = sessions.length;
  document.getElementById('s-orgs').textContent = [...new Set(speakers.map(s=>s.org))].length;
  document.getElementById('s-areas').textContent = [...new Set(speakers.map(s=>s.area))].length;

  const filtered = speakers.filter(s =>
    !q || s.name.toLowerCase().includes(q) || s.org.toLowerCase().includes(q) || s.area.toLowerCase().includes(q)
  );

  document.getElementById('speakers-grid').innerHTML = filtered.length ? filtered.map(s => {
    const spSessions = sessions.filter(x=>x.speakerId===s.id);
    return `<div class="speaker-card">
      <div class="speaker-avatar">${initials(s.name)}</div>
      <div class="speaker-name">${s.name}</div>
      <div class="speaker-org">${s.org}</div>
      <div class="speaker-tags" style="margin-bottom:14px">
        <span class="tag">${s.area}</span>
        <span class="tag">${spSessions.length} sessões</span>
      </div>
      <p style="font-size:0.78rem;color:var(--text3);margin-bottom:14px;line-height:1.5">${s.bio}</p>
      <div style="display:flex;gap:8px;justify-content:center">
        <button class="btn btn-secondary btn-sm" onclick="viewProfile(${s.id})">Ver Perfil</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSpeaker(${s.id})">✕</button>
      </div>
    </div>`;
  }).join('') : '<div style="color:var(--text3);padding:32px;grid-column:1/-1;text-align:center">Nenhum orador encontrado.</div>';
}

function addSpeaker() {
  const name = document.getElementById('n-name').value.trim();
  const org = document.getElementById('n-org').value.trim();
  if (!name) { showToast('Insira o nome','warning'); return; }
  const speakers = DB.get('speakers') || [];
  speakers.unshift({
    id: nextId('speakers'), name, org: org||'Independente',
    area: document.getElementById('n-area').value||'Geral',
    bio: document.getElementById('n-bio').value||'', sessions:[]
  });
  DB.set('speakers', speakers);
  closeModal('modal-new');
  showToast('Orador criado!');
  renderSpeakers();
}

function deleteSpeaker(id) {
  DB.set('speakers', (DB.get('speakers')||[]).filter(s=>s.id!==id));
  showToast('Orador removido','warning');
  renderSpeakers();
}

function viewProfile(id) {
  const speakers = DB.get('speakers') || [];
  const sessions = DB.get('sessions') || [];
  const events = DB.get('events') || [];
  const s = speakers.find(x=>x.id===id);
  if (!s) return;
  const spSessions = sessions.filter(x=>x.speakerId===id);
  document.getElementById('p-name').textContent = s.name;
  document.getElementById('p-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      <div class="speaker-avatar" style="width:64px;height:64px;font-size:1.3rem;flex-shrink:0">${initials(s.name)}</div>
      <div>
        <div style="font-weight:700;font-size:1rem">${s.name}</div>
        <div style="color:var(--text3);font-size:0.85rem">${s.org}</div>
        <span class="tag" style="margin-top:6px;display:inline-block">${s.area}</span>
      </div>
    </div>
    <div style="background:var(--surface);border-radius:var(--radius-sm);padding:14px;margin-bottom:16px;font-size:0.875rem;color:var(--text2);line-height:1.6">${s.bio||'Sem biografia.'}</div>
    <div style="font-weight:600;margin-bottom:10px;font-size:0.85rem">Sessões Associadas (${spSessions.length})</div>
    ${spSessions.map(sess=>{
      const ev = events.find(e=>e.id===sess.eventId);
      return `<div class="schedule-item">
        <div class="schedule-time">${sess.start}</div>
        <div class="schedule-dot"></div>
        <div class="schedule-info"><div class="session">${sess.title}</div><div class="speaker">${ev?ev.name:''} · ${sess.room}</div></div>
      </div>`;
    }).join('')||'<div style="color:var(--text3);font-size:0.85rem">Sem sessões atribuídas.</div>'}
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary btn-sm" onclick="closeModal('modal-profile');showToast('Perfil guardado')">💾 Guardar</button>
    </div>`;
  openModal('modal-profile');
}

function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
renderSpeakers();
</script>
</body>
</html>
