<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EventFlow — Agenda</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo"><h1>⚡ EventFlow</h1><span>Gestão Inteligente de Eventos</span></div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer"><div class="user-card"><div class="user-avatar">AD</div><div class="user-info"><div class="name">Admin User</div><div class="role">Administrador</div></div></div></div>
</div>
<div class="main">
  <div class="topbar">
    <span class="topbar-title">⏱️ Gestão de Agenda</span>
    <div class="topbar-search"><span class="search-icon">🔍</span><input type="text" id="search-s" placeholder="Pesquisar sessões..." oninput="renderSessions()"/></div>
    <div class="topbar-actions"><button class="btn btn-primary btn-sm" onclick="openModal('modal-new')">+ Nova Sessão</button></div>
  </div>
  <div style="padding:32px">
    <div class="grid grid-4" style="margin-bottom:24px">
      <div class="stat-card"><div class="stat-icon purple">🎙️</div><div class="stat-info"><div class="value" id="s-total">0</div><div class="label">Total Sessões</div></div></div>
      <div class="stat-card"><div class="stat-icon blue">🗓️</div><div class="stat-info"><div class="value" id="s-events">0</div><div class="label">Eventos c/ Sessões</div></div></div>
      <div class="stat-card"><div class="stat-icon green">🎤</div><div class="stat-info"><div class="value" id="s-speakers">0</div><div class="label">Oradores Ativos</div></div></div>
      <div class="stat-card"><div class="stat-icon yellow">⭐</div><div class="stat-info"><div class="value" id="s-favs">0</div><div class="label">Favoritos Totais</div></div></div>
    </div>

    <div style="display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap">
      <select class="form-control" id="f-event" style="width:auto;padding:8px 14px;font-size:0.85rem" onchange="renderSessions()">
        <option value="">Todos os eventos</option>
      </select>
      <div style="margin-left:auto;font-size:0.85rem;color:var(--text3)" id="session-count"></div>
    </div>

    <div class="grid grid-2" id="agenda-cols">
      <div class="card" id="sessions-list">
        <div style="font-weight:700;margin-bottom:16px;font-size:1rem">📋 Todas as Sessões</div>
        <div id="sessions-items"></div>
      </div>
      <div class="card" id="session-detail-panel" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="font-weight:700">Detalhe da Sessão</div>
          <button class="btn btn-secondary btn-sm" onclick="document.getElementById('session-detail-panel').style.display='none';document.getElementById('sessions-list').style.gridColumn=''">✕</button>
        </div>
        <div id="session-detail-body"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-new">
  <div class="modal">
    <div class="modal-header"><h3>➕ Nova Sessão</h3><button class="modal-close" onclick="closeModal('modal-new')">✕</button></div>
    <div class="form-group"><label>Título da Sessão</label><input class="form-control" id="n-title" placeholder="Ex: Inteligência Artificial Aplicada"/></div>
    <div class="form-group"><label>Evento</label><select class="form-control" id="n-event"></select></div>
    <div class="form-group"><label>Orador</label><select class="form-control" id="n-speaker"></select></div>
    <div class="grid grid-2" style="gap:12px">
      <div class="form-group"><label>Hora Início</label><input class="form-control" id="n-start" type="time" value="10:00"/></div>
      <div class="form-group"><label>Hora Fim</label><input class="form-control" id="n-end" type="time" value="11:00"/></div>
    </div>
    <div class="form-group"><label>Sala / Link</label><input class="form-control" id="n-room" placeholder="Ex: Sala A / Online"/></div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-primary" onclick="addSession()">Criar Sessão</button>
      <button class="btn btn-secondary" onclick="closeModal('modal-new')">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="nav.js"></script><script src="data.js"></script>
<script>
buildSidebar('agenda');

function populateSelects() {
  const events = DB.get('events') || [];
  const speakers = DB.get('speakers') || [];
  const fev = document.getElementById('f-event');
  fev.innerHTML = '<option value="">Todos os eventos</option>' + events.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
  document.getElementById('n-event').innerHTML = events.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
  document.getElementById('n-speaker').innerHTML = speakers.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}

function renderSessions() {
  const sessions = DB.get('sessions') || [];
  const events = DB.get('events') || [];
  const speakers = DB.get('speakers') || [];
  const favs = DB.get('favorites') || [];
  const q = document.getElementById('search-s').value.toLowerCase();
  const fev = document.getElementById('f-event').value;

  document.getElementById('s-total').textContent = sessions.length;
  document.getElementById('s-events').textContent = [...new Set(sessions.map(s=>s.eventId))].length;
  document.getElementById('s-speakers').textContent = [...new Set(sessions.map(s=>s.speakerId))].length;
  document.getElementById('s-favs').textContent = sessions.reduce((a,s)=>a+(s.favorites||0),0);

  const filtered = sessions.filter(s =>
    (!q || s.title.toLowerCase().includes(q)) &&
    (!fev || String(s.eventId)===fev)
  );
  document.getElementById('session-count').textContent = `${filtered.length} sessões`;

  // Group by event
  const byEvent = {};
  filtered.forEach(s => {
    if (!byEvent[s.eventId]) byEvent[s.eventId] = [];
    byEvent[s.eventId].push(s);
  });

  let html = '';
  Object.entries(byEvent).forEach(([eid, slist]) => {
    const ev = events.find(e=>e.id===parseInt(eid));
    html += `<div style="margin-bottom:20px">
      <div style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent2);margin-bottom:10px">${ev?ev.name:'Evento Desconhecido'}</div>
      ${slist.sort((a,b)=>a.start.localeCompare(b.start)).map(s => {
        const sp = speakers.find(x=>x.id===s.speakerId);
        const isFav = favs.includes(s.id);
        return `<div class="schedule-item" style="cursor:pointer" onclick="showDetail(${s.id})">
          <div class="schedule-time">${s.start}–${s.end}</div>
          <div class="schedule-dot"></div>
          <div class="schedule-info" style="flex:1">
            <div class="session">${s.title}</div>
            <div class="speaker">${sp?sp.name:'—'} · ${s.room}</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <button onclick="event.stopPropagation();toggleFav(${s.id})" style="background:none;border:none;cursor:pointer;font-size:1.1rem;color:${isFav?'var(--warning)':'var(--text3)'}">${isFav?'★':'☆'}</button>
            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteSession(${s.id})">✕</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  });
  document.getElementById('sessions-items').innerHTML = html || '<div style="color:var(--text3)">Nenhuma sessão encontrada.</div>';
}

function showDetail(id) {
  const sessions = DB.get('sessions') || [];
  const events = DB.get('events') || [];
  const speakers = DB.get('speakers') || [];
  const s = sessions.find(x=>x.id===id);
  if (!s) return;
  const ev = events.find(e=>e.id===s.eventId);
  const sp = speakers.find(x=>x.id===s.speakerId);
  document.getElementById('session-detail-body').innerHTML = `
    <div style="margin-bottom:20px">
      <div style="font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:6px">${s.title}</div>
      <div style="color:var(--text3);font-size:0.85rem">${ev?ev.name:''}</div>
    </div>
    <div class="grid grid-2" style="gap:10px;margin-bottom:16px">
      <div class="card" style="padding:12px"><div style="font-size:0.7rem;color:var(--text3)">Horário</div><strong>${s.start} – ${s.end}</strong></div>
      <div class="card" style="padding:12px"><div style="font-size:0.7rem;color:var(--text3)">Sala</div><strong>${s.room}</strong></div>
    </div>
    ${sp?`<div class="speaker-card" style="text-align:left;padding:14px;margin-bottom:16px;display:flex;gap:12px;align-items:center">
      <div class="speaker-avatar" style="width:44px;height:44px;font-size:0.9rem;flex-shrink:0">${sp.name.split(' ').map(n=>n[0]).join('').slice(0,2)}</div>
      <div><div style="font-weight:700">${sp.name}</div><div style="font-size:0.78rem;color:var(--text3)">${sp.org} · ${sp.area}</div></div>
    </div>`:''}
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="showToast('Sessão guardada')">💾 Guardar</button>
      <button class="btn btn-secondary btn-sm" onclick="toggleFav(${s.id});renderSessions()">⭐ Favorito</button>
    </div>`;
  document.getElementById('session-detail-panel').style.display = 'block';
}

function addSession() {
  const title = document.getElementById('n-title').value.trim();
  if (!title) { showToast('Insira o título','warning'); return; }
  const sessions = DB.get('sessions') || [];
  sessions.push({
    id: nextId('sessions'),
    eventId: parseInt(document.getElementById('n-event').value),
    speakerId: parseInt(document.getElementById('n-speaker').value),
    title, start: document.getElementById('n-start').value,
    end: document.getElementById('n-end').value,
    room: document.getElementById('n-room').value||'TBD', favorites: 0
  });
  DB.set('sessions', sessions);
  closeModal('modal-new');
  showToast('Sessão criada!');
  renderSessions();
}

function deleteSession(id) {
  DB.set('sessions', (DB.get('sessions')||[]).filter(s=>s.id!==id));
  showToast('Sessão eliminada','warning');
  renderSessions();
}

function toggleFav(id) {
  let favs = DB.get('favorites') || [];
  if (favs.includes(id)) favs = favs.filter(f=>f!==id);
  else favs.push(id);
  DB.set('favorites', favs);
  renderSessions();
}

function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

populateSelects();
renderSessions();
</script>
</body>
</html>
